<!DOCTYPE html>
<html lang="en">

<head>
  <!-- meta tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="shortcut icon" href="./assets/images/logo.png" type="image/png">
  <!-- style -->
  <link rel="stylesheet" href="./index.css">
  <!-- import module -->
  <script src="./modules/soundbox.js" type="module"></script>
  <!-- page title -->
  <title>SoundBox - Embeddable Audio Player for Modern Websites</title>
</head>

<body>
  <!-- soundbox -->
  <soundbox class="example-soundbox">
    <!-- track #1 -->
    <source
      src="./assets/music/upbeat.mp3"
      cover="./assets/music/upbeat.jpg"
      artist="Viacheslav Starostin"
      title="Upbeat"
    />
    <!-- track #2 -->
    <source
      src="./assets/music/berry.mp3"
      cover="./assets/music/berry.jpg"
      artist="Giorgio Vitté"
      title="Berry"
    />
  </soundbox>
</body>

</html>
