<!DOCTYPE html>
<html lang="en">

<head>
  <!-- meta tags -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- favicon -->
  <link rel="shortcut icon" href="./assets/images/logo.png" type="image/png">
  <!-- style -->
  <link rel="stylesheet" href="./index.css">
  <!-- import module -->
  <script src="./modules/soundbox.js" type="module"></script>
  <!-- page title -->
  <title>SoundBox - Embeddable Audio Player for Modern Websites</title>
</head>

<body>
  <!-- soundbox -->
  <soundbox preload class="example-soundbox">
    <!-- https://pixabay.com/music/electronic-pop-music-478803/ -->
    <source
      title="Pop Music"
      artist="AlexGrohl"
      cover="./assets/music/pop-music.jpg"
      src="./assets/music/pop-music.mp3"
    />
    <!-- https://pixabay.com/music/happy-childrens-tunes-motivation-474064/ -->
    <source
      title="Motivation"
      artist="Eliveta"
      cover="./assets/music/motivation.jpg"
      src="./assets/music/motivation.mp3"
    />
    <!-- https://pixabay.com/music/upbeat-fun-upbeat-background-music-366059/ -->
    <source
      title="Upbeat"
      artist="Viacheslav Starostin"
      cover="./assets/music/upbeat.jpg"
      src="./assets/music/upbeat.mp3"
    />
    <!-- https://pixabay.com/music/techno-trance-chill-uk-garage-488026/ -->
    <source
      title="Chill"
      artist="Giorgio Vitté"
      cover="./assets/music/chill.jpg"
      src="./assets/music/chill.mp3"
    />
  </soundbox>
</body>

</html>
